<svg viewBox="0 0 1200 300" width="1200" height="300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Manoj Kumar Chunduru, Epic Hospital Billing Analyst. Animated banner of a hospital claim lifecycle where a denied claim is recovered through root cause analysis.">
  <defs>
    <linearGradient id="headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4cc9f0">
        <animate attributeName="stop-color" values="#4cc9f0;#80ed99;#c77dff;#4cc9f0" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#80ed99">
        <animate attributeName="stop-color" values="#80ed99;#c77dff;#4cc9f0;#80ed99" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#c77dff">
        <animate attributeName="stop-color" values="#c77dff;#4cc9f0;#80ed99;#c77dff" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <clipPath id="typewriter">
      <rect x="48" y="196" width="0" height="22">
        <animate attributeName="width" from="0" to="474" begin="0.8s" dur="2.8s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="frame"><rect width="1200" height="300" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="#0D1117"/>

    <!-- faint dollar-grid texture, revenue cycle wallpaper -->
    <g font-family="Consolas, Monaco, monospace" font-size="11" fill="#161B22" opacity="0.9">
      <text x="640" y="40">837</text><text x="780" y="62">835</text>
      <text x="930" y="34">CARC 197</text><text x="1090" y="58">CPT 27447</text>
      <text x="700" y="282">ICD-10</text><text x="880" y="270">HCPCS</text>
      <text x="1040" y="284">WQ04</text><text x="600" y="262">SQL</text>
    </g>

    <!-- ===================== claim lifecycle scene ===================== -->
    <!-- main pipeline rail -->
    <path id="rail" d="M615 128 H1145" stroke="#30363d" stroke-width="2" fill="none"/>
    <!-- denial detour rail: drops after PAYER, through ROOT CAUSE, rejoins before PAID -->
    <path id="detour" d="M615 128 H985 q14 0 14 14 v42 q0 14 14 14 h44 h44 q14 0 14 -14 v-42 q0 -14 14 -14 H1145"
          stroke="#30363d" stroke-width="1.4" stroke-dasharray="4 4" fill="none"/>

    <!-- lifecycle nodes: breathing, staggered -->
    <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#8B949E" text-anchor="middle" letter-spacing="1">
      <circle cx="615" cy="128" r="9" fill="#161B22" stroke="#4cc9f0" stroke-width="2">
        <animate attributeName="r" values="9;11;9" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text x="615" y="108">ENCOUNTER</text>

      <circle cx="748" cy="128" r="9" fill="#161B22" stroke="#4cc9f0" stroke-width="2">
        <animate attributeName="r" values="9;11;9" dur="3s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      </circle>
      <text x="748" y="108">CHARGE</text>

      <circle cx="866" cy="128" r="9" fill="#161B22" stroke="#4cc9f0" stroke-width="2">
        <animate attributeName="r" values="9;11;9" dur="3s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <text x="866" y="108">CLAIM 837</text>

      <circle cx="985" cy="128" r="9" fill="#161B22" stroke="#c77dff" stroke-width="2">
        <animate attributeName="r" values="9;11;9" dur="3s" begin="1.8s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" begin="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="985" y="108">PAYER 835</text>

      <circle cx="1145" cy="128" r="9" fill="#161B22" stroke="#80ed99" stroke-width="2.5">
        <animate attributeName="r" values="9;12;9" dur="3s" begin="2.4s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" begin="2.4s" repeatCount="indefinite"/>
      </circle>
      <text x="1145" y="108">PAID</text>

      <!-- root cause node on the denial lane -->
      <rect x="1041" y="184" width="14" height="14" rx="3" fill="#161B22" stroke="#f85149" stroke-width="2" transform="rotate(45 1048 191)">
        <animate attributeName="stroke" values="#f85149;#f0883e;#f85149" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <text x="1048" y="222" fill="#f0883e">ROOT CAUSE</text>
      <text x="930" y="222" fill="#f85149" opacity="0.8">DENIED</text>
    </g>

    <!-- clean claims: staggered pulses riding the rail to PAID -->
    <circle r="4" fill="#4cc9f0">
      <animateMotion dur="5s" begin="0s" repeatCount="indefinite"><mpath href="#rail"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.92;1" dur="5s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#4cc9f0;#4cc9f0;#80ed99" keyTimes="0;0.8;1" dur="5s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.4" fill="#4cc9f0">
      <animateMotion dur="6.4s" begin="1.9s" repeatCount="indefinite"><mpath href="#rail"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.92;1" dur="6.4s" begin="1.9s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#4cc9f0;#4cc9f0;#80ed99" keyTimes="0;0.8;1" dur="6.4s" begin="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.4" fill="#4cc9f0">
      <animateMotion dur="5.6s" begin="3.4s" repeatCount="indefinite"><mpath href="#rail"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.92;1" dur="5.6s" begin="3.4s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#4cc9f0;#4cc9f0;#80ed99" keyTimes="0;0.8;1" dur="5.6s" begin="3.4s" repeatCount="indefinite"/>
    </circle>

    <!-- THE denied claim: turns red at the payer, drops into the denial
         lane, is classified at root cause, re-enters green and gets paid -->
    <circle r="4.6" fill="#4cc9f0">
      <animateMotion dur="9s" begin="0.9s" repeatCount="indefinite"><mpath href="#detour"/></animateMotion>
      <animate attributeName="fill" values="#4cc9f0;#4cc9f0;#f85149;#f85149;#80ed99;#80ed99" keyTimes="0;0.42;0.46;0.72;0.78;1" dur="9s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.94;1" dur="9s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4.6;4.6;5.6;4.6;4.6" keyTimes="0;0.42;0.5;0.6;1" dur="9s" begin="0.9s" repeatCount="indefinite"/>
    </circle>

    <!-- recovered dollars tick up when the recovered claim lands -->
    <text x="1145" y="160" font-family="Consolas, Monaco, monospace" font-size="11" fill="#80ed99" text-anchor="middle" opacity="0">
      +$
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.9;0.94;1" dur="9s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="160;160;146;140" keyTimes="0;0.9;0.96;1" dur="9s" begin="0.9s" repeatCount="indefinite"/>
    </text>

    <!-- ===================== left column ===================== -->
    <text x="48" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#headline)">Manoj Kumar Chunduru</text>
    <text x="50" y="132" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#8B949E">Epic Analyst &#183; Hospital Billing &#183; Revenue Cycle Analytics</text>

    <!-- rotating specialty line, one per portfolio repo -->
    <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14.5" fill="#4cc9f0">
      <text x="50" y="166" opacity="0">denial pattern mining and revenue leakage
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="20s" repeatCount="indefinite"/>
      </text>
      <text x="50" y="166" opacity="0">HL7 order-to-charge reconciliation
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.28;0.47;0.5;1" dur="20s" repeatCount="indefinite"/>
      </text>
      <text x="50" y="166" opacity="0">UAT regression automation for EHR upgrades
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.53;0.72;0.75;1" dur="20s" repeatCount="indefinite"/>
      </text>
      <text x="50" y="166" opacity="0">workqueue flow and routing conflict analytics
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.78;0.97;1" dur="20s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- terminal line: typed out, cursor tracks, then blinks -->
    <text x="48" y="212" font-family="Consolas, Monaco, monospace" font-size="14" fill="#3FB950" clip-path="url(#typewriter)">$ every number on this profile is measured by code you can clone</text>
    <rect x="50" y="200" width="8" height="15" fill="#3FB950">
      <animate attributeName="x" from="50" to="524" begin="0.8s" dur="2.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" begin="3.6s" repeatCount="indefinite"/>
    </rect>

    <!-- quiet metric chips -->
    <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">
      <rect x="48" y="236" width="188" height="26" rx="13" fill="#161B22" stroke="#30363d"/>
      <text x="62" y="253" fill="#8B949E">99.5% denial precision</text>
      <rect x="244" y="236" width="188" height="26" rx="13" fill="#161B22" stroke="#30363d"/>
      <text x="258" y="253" fill="#8B949E">1M rows validated in 67s</text>
      <rect x="440" y="236" width="150" height="26" rx="13" fill="#161B22" stroke="#30363d"/>
      <text x="454" y="253" fill="#8B949E">30K HL7 msg/s</text>
    </g>
  </g>
</svg>
